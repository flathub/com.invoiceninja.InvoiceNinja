# yaml-language-server: $schema=https://raw.githubusercontent.com/flatpak/flatpak-builder/main/data/flatpak-manifest.schema.json

---
app-id: com.invoiceninja.InvoiceNinja
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: invoiceninja
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-pictures
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
modules:
  - name: Invoice-Ninja
    buildsystem: simple
    only-arches:
      - x86_64
    build-commands:
      - "./build-flatpak.sh"
    sources:
      - type: file
        url: https://github.com/invoiceninja/admin-portal/releases/download/v5.0.187/Invoice-Ninja-Linux-Portable.tar.gz
        sha256: 8a3158a47901273626d2a748b2f477d9f6a63dc6669359f1c147d5abb7ec1579
      - type: git
        url: https://github.com/invoiceninja/admin-portal.git
        tag: v5.0.187
      - type: file
        path: build-flatpak.sh
